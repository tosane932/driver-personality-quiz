<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運転性格診断テスト (50問)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>🚛 運転性格診断テスト</h1>
        <p>現場のための安全運転プロファイリング（全50問）</p>
    </header>

    <div id="quiz-container"></div>

    <div id="result-area">
        <div style="text-align: right; margin-bottom: 15px;">
            <button class="option-btn" style="width: auto; display: inline-block; padding: 10px 20px;" onclick="resetQuiz()">🔄 テストをやり直す</button>
        </div>

        <div class="result-header">
            <h2>診断結果</h2>
            <div class="score-display"><span id="total-score">0</span>点</div>
            <div class="result-title" id="result-status">判定中...</div>
            <div class="result-desc" id="result-commentary"></div>
        </div>

        <div class="breakdown-title">📊 回答内訳</div>
        <div id="breakdown-container"></div>

        <div style="text-align: center; margin-top: 25px;">
            <button class="option-btn" style="width: 100%; max-width: 300px; text-align: center; background-color: var(--primary-color); color: white;" onclick="resetQuiz()">🔄 もう一度テストを受ける</button>
        </div>
    </div>
</div>

<script src="quizData.js"></script>
<script src="app.js"></script>
</body>
</html>
